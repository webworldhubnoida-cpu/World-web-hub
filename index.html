    <!-- ✅ Tawk.to Live Chat Script -->
    <script type="text/javascript">
      var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();

      // Ensure the widget hides itself again if the user minimizes it
      Tawk_API.onChatMinimized = function() {
        if (Tawk_API.hideWidget) Tawk_API.hideWidget();
      };

      (function () {
        var s1 = document.createElement("script"),
          s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        // IMPORTANT: Replace the ID below with your actual Tawk.to property ID
        s1.src = "https://embed.tawk.to/67bc02e482322a19246d601d/1ilo6j6l7";
        s1.charset = "UTF-8";
        s1.setAttribute("crossorigin", "*");
        s0.parentNode.insertBefore(s1, s0);
      })();
    </script>
